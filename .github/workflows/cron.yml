name: Hacker News Cron Job

on:
  schedule:
    # KST 08:00 = UTC 23:00 (전날)
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 실행 허용

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deployment API
        run: |
          curl -X GET "https://${{ secrets.VERCEL_DOMAIN }}/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
