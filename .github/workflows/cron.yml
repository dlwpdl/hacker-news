name: Hacker News Cron Job

on:
  schedule:
    # KST 08:00 = UTC 23:00 (전날)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Optional number of items to send'
        required: false
        type: number

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache@v6
        with:
          path: .cache/security-news-sent.json
          key: ${{ runner.os }}-security-news-sent-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-security-news-sent-

      - run: npm ci

      - run: npx tsx scripts/send.ts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          NEWS_LIMIT: ${{ github.event.inputs.limit || '' }}
          SENT_URLS_FILE: .cache/security-news-sent.json
